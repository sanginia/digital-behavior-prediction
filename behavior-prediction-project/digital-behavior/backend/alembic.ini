
[alembic]
# path to migration scripts directory
script_location = migrations

# version filename format
version_locations = %(here)s/migrations/versions

# timezone for dates
timezone = UTC

# script revision format
revision_environment = %(here)s/migrations/versions

# General
# Leave empty - DATABASE_URL will be set from environment variable in env.py
sqlalchemy.url =

# Logging
log_file = %(here)s/alembic.log
log_level = INFO

# JSON schema export
json_ensure_ascii = false
json_indent = 4

# Other settings
file_template = %%(revision)s_%%(name)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
formatter = generic
args = (sys.stderr,)

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
